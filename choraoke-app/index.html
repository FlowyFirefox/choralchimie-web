<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0A0A0A">
<title>Choraoké — La ChorAlchimie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg)!important;color:#F0EBE3;font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
:root{--braise:#C25918;--braise-dark:#B04D10;--amethyste:#5A2090;--border:rgba(255,255,255,0.08);--text:#F0EBE3;--sub:rgba(240,235,227,0.65);--muted:rgba(240,235,227,0.45);--bg:#0A0A0A;--s1:#111;--s2:#181818;--s3:#222}
body.light{--bg:#F5EFE3;--s1:#FDFAF5;--s2:#EDE6D6;--s3:#E3D9C6;--text:#2C2416;--sub:rgba(44,36,22,.65);--muted:rgba(44,36,22,.4);--border:rgba(44,36,22,.1);--bsp-bg:rgba(44,36,22,.1);--bsp-bd:rgba(44,36,22,.15)}
.theme-toggle{position:fixed;bottom:76px;right:16px;width:40px;height:40px;border-radius:50%;border:none;background:var(--s2);color:var(--text);font-size:18px;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.25);transition:transform .15s}.theme-toggle:active{transform:scale(.92)}
.fab{position:fixed;bottom:24px;right:16px;width:52px;height:52px;border-radius:50%;border:none;background:var(--braise);color:#fff;font-size:24px;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(194,89,24,.35);transition:transform .15s}.fab:active{transform:scale(.92)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}.modal-overlay.open{display:block}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-radius:24px 24px 0 0;padding:20px 20px env(safe-area-inset-bottom);z-index:301;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}.modal-sheet.open{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--muted);margin:0 auto 16px;opacity:.4}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text);margin-bottom:16px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;letter-spacing:.04em}
.modal-field input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text);outline:none;-webkit-appearance:none}.modal-field input:focus{border-color:var(--braise)}
.modal-field input::placeholder{color:var(--muted)}
.modal-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.modal-chips .mchip{padding:6px 12px;border-radius:16px;border:1px solid var(--border);background:var(--s1);font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--sub);cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}.modal-chips .mchip.on{background:var(--braise);border-color:var(--braise);color:#fff}
.modal-submit{width:100%;padding:14px;border:none;border-radius:12px;background:var(--braise);color:#fff;font-family:'DM Serif Display',serif;font-size:15px;cursor:pointer;transition:transform .15s;min-height:48px;margin-top:4px}.modal-submit:active{transform:scale(.97)}.modal-submit:disabled{opacity:.5}
.modal-toast{position:fixed;bottom:80px;left:16px;right:16px;padding:14px;border-radius:12px;font-family:'Cormorant Garamond',serif;font-size:14px;text-align:center;color:#fff;transform:translateY(40px);opacity:0;transition:all .3s;z-index:400;pointer-events:none}.modal-toast.ok{background:#4E7A65}.modal-toast.err{background:var(--braise)}.modal-toast.show{transform:translateY(0);opacity:1}
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border)}
.logo-banner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;border-bottom:1px solid var(--border);cursor:pointer}
.header-logo{height:64px;width:auto;object-fit:contain}
.linktree-hint{font-size:12px;color:var(--braise);font-style:italic;letter-spacing:.05em;white-space:nowrap}
.header-mid{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px}
.app-title{font-family:'DM Serif Display',serif;font-size:18px;color:#F0EBE3;letter-spacing:.02em}
.app-sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.count{font-size:11px;color:var(--muted);letter-spacing:.05em}
.count span{color:var(--braise);font-weight:600}
.search-wrap{position:relative;padding:0 16px 12px}
.search-input{width:100%;background:#181818!important;border:1px solid var(--border);border-radius:12px;padding:10px 36px 10px 38px;font-family:'Cormorant Garamond',serif;font-size:16px;color:#F0EBE3!important;outline:none;-webkit-appearance:none}
.search-input::placeholder{color:var(--muted)!important;font-style:italic}
.search-input:focus{border-color:var(--braise);box-shadow:0 0 0 3px rgba(194,89,24,.2)}
.si{position:absolute;left:28px;top:50%;transform:translateY(-60%);color:var(--muted);pointer-events:none}
.clr{position:absolute;right:26px;top:50%;transform:translateY(-60%);background:var(--s3);border:none;border-radius:50%;width:22px;height:22px;color:var(--muted);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:11px}
.clr.on{display:flex}
.filters{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;background:var(--bg)!important}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:#181818!important;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--sub);cursor:pointer;transition:all .18s;white-space:nowrap}
.chip.on.br{background:var(--braise)!important;border-color:var(--braise);color:#fff;font-weight:600}
.chip.on.am{background:var(--amethyste)!important;border-color:var(--amethyste);color:#fff;font-weight:600}
.rbar{padding:8px 16px;font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg)!important}
.list{list-style:none;background:var(--bg)!important}
.si-item{border-bottom:1px solid var(--border);background:var(--bg)!important}
.si-top{display:flex;align-items:flex-start;gap:10px;padding:12px 16px 10px;cursor:pointer;background:var(--bg)!important}
.si-top:active{background:#181818!important}
.lang{flex-shrink:0;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
.lE{background:rgba(194,89,24,.15);color:var(--braise)}
.lF{background:rgba(90,32,144,.18);color:#8B5CF6}
.lI{background:rgba(34,197,94,.12);color:#4ADE80}
.si-info{flex:1;min-width:0}
.si-name{font-family:'DM Serif Display',serif;font-size:15px;color:#F0EBE3!important;line-height:1.25;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-artist{font-size:13px;color:var(--sub)!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;font-style:italic}
.si-tags{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tag{font-size:10.5px;padding:2px 7px;border-radius:10px;font-family:'Cormorant Garamond',serif}
.td{background:rgba(255,255,255,.06);color:var(--sub)}
.ti{color:var(--muted);font-style:italic}
.tb{color:var(--muted);font-size:10px}
.chev{flex-shrink:0;color:var(--muted);transition:transform .2s;margin-top:2px}
.si-item.open .chev{transform:rotate(180deg)}
.si-actions{overflow:hidden;max-height:0;transition:max-height .25s cubic-bezier(.4,0,.2,1);background:#181818!important}
.si-item.open .si-actions{max-height:200px}
.act-inner{padding:10px 16px 14px}
.ki{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.kb{background:#222!important;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--sub);font-family:'Cormorant Garamond',serif}
.kb strong{color:#F0EBE3;font-weight:600}
.capo{background:rgba(194,89,24,.12);border:1px solid rgba(194,89,24,.25);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--braise);font-family:'Cormorant Garamond',serif}
.abtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.abtn{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 10px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Serif Display',serif;font-size:14px;color:#fff;transition:transform .15s,filter .15s;line-height:1}
.abtn:active{transform:scale(.97)}
.bge{background:var(--euca,#4E7A65);grid-column:1/-1;padding:14px 10px;font-size:15px}
.bsp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15)}.light .bsp,.light .bdz{background:rgba(44,36,22,.07);border-color:rgba(44,36,22,.15);color:var(--text)}
.bdz{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15)}
.bjr{background:var(--amethyste);grid-column:1/-1}
.empty{text-align:center;padding:60px 20px;color:var(--muted);background:var(--bg)!important}
.empty-t{font-family:'DM Serif Display',serif;font-size:20px;color:var(--sub);margin-bottom:6px}
mark{background:rgba(194,89,24,.35);color:var(--braise);border-radius:2px;padding:0 1px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
.setlist-btn{display:block;width:calc(100% - 32px);margin:8px 16px 12px;padding:14px;background:var(--braise);color:#fff;border:none;border-radius:14px;font-family:'DM Serif Display',serif;font-size:16px;cursor:pointer;text-align:center;transition:transform .15s;box-shadow:0 4px 16px rgba(194,89,24,.35)}
.setlist-btn:active{transform:scale(.97)}
.setlist-btn .sl-meta{font-family:'Cormorant Garamond',serif;font-size:12px;opacity:.85;margin-top:2px}
.setlist-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;-webkit-overflow-scrolling:touch}
.setlist-overlay.open{display:block}
.setlist-header{position:sticky;top:0;background:var(--bg);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;z-index:301}
.setlist-back{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px;min-width:36px;min-height:36px}
.setlist-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text)}
.setlist-num{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--braise);color:#fff;font-size:13px;font-weight:700;flex-shrink:0;margin-right:8px}
.setlist-divider{list-style:none;padding:18px 16px 8px;font-family:'DM Serif Display',serif;font-size:13px;color:var(--sub);text-transform:uppercase;letter-spacing:.12em;border-top:1px solid var(--border);margin-top:8px}
</style>

function card(s,idx){
  const sp='https://open.spotify.com/search/'+encodeURIComponent(s.n+' '+s.a);
  const dz='https://www.deezer.com/search/'+encodeURIComponent(s.n+' '+s.a);
  const ge=s.gu?s.gu:'https://genius.com/search?q='+encodeURIComponent(s.n+' '+s.a);
  const ug='https://www.ultimate-guitar.com/search.php?search_type=title&value='+encodeURIComponent(s.n);
  const lc='l'+s.l;
  const ii=IICO[s.i]||'🎵';
  const capo=s.c?'<span class="capo">'+s.c+'</span>':'';
  const bpm=s.b?'<span class="tag tb">♩'+s.b+'</span>':'';
  const bpmk=s.b?'<span class="kb">♩ <strong>'+s.b+' BPM</strong></span>':'';
  const e=document.createElement('div');
  e.textContent=sp;const esp=e.innerHTML.replace(/"/g,'&quot;');
  e.textContent=dz;const edz=e.innerHTML.replace(/"/g,'&quot;');
  e.textContent=ge;const ege=e.innerHTML.replace(/"/g,'&quot;');
  e.textContent=ug;const eug=e.innerHTML.replace(/"/g,'&quot;');

        +'<div class="si-tags"><span class="tag td">'+DIFF[s.d]+'</span><span class="tag ti">'+ii+' '+INAME[s.i]+'</span>'+bpm+'</div>'

}

function render(){
  const q2=q.toLowerCase();
  const res=S.filter(s=>{
    const ok=!q2||(s.n.toLowerCase().includes(q2)||s.a.toLowerCase().includes(q2));
    if(!ok)return false;
    if(af==='all')return true;
    if(af==='E'||af==='F'||af==='I')return s.l===af;
    if(af==='1')return s.d===1;
    if(af==='2')return s.d===2;
    if(af==='3')return s.d===3;
    if(af==='P'||af==='G')return s.i===af;
    return true;
  });
  const n=res.length;
  cn.textContent=n;
  rbar.textContent=n===0?'Aucun résultat':n+' morceau'+(n>1?'x':'')+' trouvé'+(n>1?'s':'');
  if(n===0){list.innerHTML='<div class="empty"><div class="empty-t">Aucun morceau</div><div>Essayez un autre filtre</div></div>';return;}
  list.innerHTML=res.map(s=>card(s,S.indexOf(s))).join('');
}

function openLink(url){
  var a=document.createElement('a');a.href=url;a.target='_blank';a.rel='noopener';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function openSpotify(url){
  var enc=url.replace('https://open.spotify.com/search/','');
  window.location.href='spotify:search:'+enc;
  var t=Date.now();setTimeout(function(){if(document.hasFocus()&&Date.now()-t<3000)openLink(url);},1500);
}
function openDeezer(url){
  var enc=url.replace('https://www.deezer.com/search/','');
  window.location.href='deezer://search?query='+enc;
  var t=Date.now();setTimeout(function(){if(document.hasFocus()&&Date.now()-t<3000)openLink(url);},1500);
}

document.addEventListener('click',function(e){
  var btn=e.target.closest('[data-href]');
  if(btn){
    e.stopPropagation();
    var url=btn.getAttribute('data-href');
    if(btn.hasAttribute('data-sp'))openSpotify(url);
    else if(btn.hasAttribute('data-dz'))openDeezer(url);
    else openLink(url);
    return;
  }
  var tg=e.target.closest('[data-tg]');
  if(tg){
    var items=document.querySelectorAll('.si-item');
    var item=Array.from(items).find(el=>+el.dataset.idx===+tg.dataset.tg);
    if(!item)return;
    var was=item.classList.contains('open');
    items.forEach(function(el){el.classList.remove('open');});
    if(!was)item.classList.add('open');
  }
});

si.addEventListener('input',function(){q=si.value;clr.classList.toggle('on',q.length>0);render();});
clr.addEventListener('click',function(){si.value='';q='';clr.classList.remove('on');si.focus();render();});
filt.addEventListener('click',function(e){
  var c=e.target.closest('.chip');if(!c)return;
  document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on','br','am');});
  c.classList.add('on');
  af=c.dataset.f;
  var warm=['all','E','1'];
  c.classList.add(warm.includes(af)?'br':'am');
  render();
});

// Setlist du soir
function openSetlist(){
  var ov=document.getElementById('setlistOverlay');
  document.getElementById('setlistTitle').textContent=SETLIST.label;
  function findIdx(s){return S.indexOf(S.find(function(x){return x.n===s.n&&x.a===s.a;}));}
  var mainHtml=(SETLIST.songs||[]).map(function(s,i){
    return card(s,findIdx(s)).replace('<div class="lang','<div class="setlist-num">'+(i+1)+'</div><div class="lang');
  }).join('');
  var bkHtml=(SETLIST.backup||[]).map(function(s){return card(s,findIdx(s));}).join('');
  var html=mainHtml;
  if(bkHtml) html+='<li class="setlist-divider">Backups</li>'+bkHtml;
  document.getElementById('setlistList').innerHTML=html;
  ov.classList.add('open');
}
if(SETLIST && ((SETLIST.songs && SETLIST.songs.length>0) || (SETLIST.backup && SETLIST.backup.length>0))){
  var slWrap=document.getElementById('setlistBtnWrap');
  if(slWrap){
    var slMeta=SETLIST.meta?'<div class="sl-meta">'+SETLIST.meta+'</div>':'';
    slWrap.innerHTML='<button class="setlist-btn" id="setlist-btn" onclick="openSetlist()">'+SETLIST.label+slMeta+'</button>';
  }
}

render();
</script>
<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Mode jour / nuit">🌙</button>

<!-- FAB Proposer un titre -->
<button class="fab" id="fabSuggest" title="Proposer un titre">＋</button>

<!-- Modal suggestion -->
<div class="modal-overlay" id="suggestOverlay"></div>
<div class="modal-sheet" id="suggestSheet">
  <div class="modal-handle"></div>
  <div class="modal-title">Proposer un titre</div>
  <form id="suggestForm">
    <div class="modal-field">
      <label>Titre *</label>
      <input type="text" id="sgTitle" placeholder="Nom du morceau" required>
    </div>
    <div class="modal-field">
      <label>Artiste *</label>
      <input type="text" id="sgArtist" placeholder="Nom de l'artiste">
    </div>
    <div class="modal-field">
      <label>Langue</label>
    </div>
    <div class="modal-chips" id="sgLangChips">
      <div class="mchip" data-val="Anglais">🇬🇧 Anglais</div>
      <div class="mchip" data-val="Français">🇫🇷 Français</div>
      <div class="mchip" data-val="Autre">🌍 Autre</div>
    </div>
    <div class="modal-field">
      <label>Instrument (optionnel)</label>
      <input type="text" id="sgInstrument" placeholder="Piano, guitare...">
    </div>
    <button type="submit" class="modal-submit" id="sgSubmit">Envoyer la suggestion</button>
  </form>
</div>
<div class="modal-toast" id="sgToast"></div>

<script>
(function(){
  var APPS_SCRIPT_SUGGESTIONS_URL = 'https://script.google.com/macros/s/AKfycbw777HCJidq_qLbPdrHqfYFTVf6ufxCSKNz1-gBS0z-thYu4g06A07LJ5GGExbVAZD5/exec';

  var fab = document.getElementById('fabSuggest');
  var overlay = document.getElementById('suggestOverlay');
  var sheet = document.getElementById('suggestSheet');
  var form = document.getElementById('suggestForm');
  var toast = document.getElementById('sgToast');

  function openModal() { overlay.classList.add('open'); sheet.classList.add('open'); }
  function closeModal() { overlay.classList.remove('open'); sheet.classList.remove('open'); }

  fab.addEventListener('click', openModal);
  overlay.addEventListener('click', closeModal);

  // Chips single-select
  document.getElementById('sgLangChips').addEventListener('click', function(e) {
    var c = e.target.closest('.mchip');
    if (!c) return;
    var was = c.classList.contains('on');
    this.querySelectorAll('.mchip').forEach(function(x) { x.classList.remove('on'); });
    if (!was) c.classList.add('on');
  });

  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'modal-toast ' + type + ' show';
    setTimeout(function() { toast.classList.remove('show'); }, 3500);
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var titre = document.getElementById('sgTitle').value.trim();
    var artiste = document.getElementById('sgArtist').value.trim();
    if (!titre) { showToast('Ajoute au moins un titre', 'err'); return; }

    var langChip = document.querySelector('#sgLangChips .mchip.on');
    var langue = langChip ? langChip.dataset.val : '';

    var btn = document.getElementById('sgSubmit');
    btn.disabled = true;
    btn.textContent = 'Envoi...';

    fetch(APPS_SCRIPT_SUGGESTIONS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        titre: titre,
        artiste: artiste,
        langue: langue,
        instrument: document.getElementById('sgInstrument').value.trim(),
        source: 'App Choraoké'
      }),
      redirect: 'follow'
    })
    .then(function(r) { return r.text(); })
    .then(function() {
      showToast('Merci pour ta suggestion 🎶', 'ok');
      form.reset();
      document.querySelectorAll('#sgLangChips .mchip.on').forEach(function(c) { c.classList.remove('on'); });
      closeModal();
      btn.disabled = false; btn.textContent = 'Envoyer la suggestion';
    })
    .catch(function() {
      showToast('Erreur réseau', 'err');
      btn.disabled = false; btn.textContent = 'Envoyer la suggestion';
    });
  });
})();
</script>

    <div class="setlist-title" id="setlistTitle">Setlist</div>
  </div>
  <ul class="list" id="setlistList"></ul>
</div>
