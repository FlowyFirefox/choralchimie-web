<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maquette Écosystème — La ChorAlchimie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   DESIGN SYSTEM
══════════════════════════════════════ */
:root {
  --cream:     #F5EFE3;
  --cream2:    #EDE6D6;
  --cream3:    #E3D9C6;
  --white:     #FDFAF5;
  --ink:       #2C2416;
  --ink2:      #4A3E2E;
  --muted:     #8A7B6A;
  --sub:       #6B5E4E;
  --braise:    #C25918;
  --braise-bg: rgba(194,89,24,0.08);
  --braise-bd: rgba(194,89,24,0.22);
  --euca:      #4E7A65;
  --euca-bg:   rgba(78,122,101,0.08);
  --euca-bd:   rgba(78,122,101,0.22);
  --gold:      #B08640;
  --gold-bg:   rgba(176,134,64,0.08);
  --border:    rgba(44,36,22,0.1);
  --border2:   rgba(44,36,22,0.06);
  --shadow:    0 2px 16px rgba(44,36,22,0.08);
  --r:         14px;
  --r-sm:      8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:15px; }
body {
  background: #2C2416;
  font-family: 'Outfit', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ══ SHELL ══ */
.shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ══ TOP BAR (design tool chrome) ══ */
.topbar {
  background: #1A140E;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 20px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 200;
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.topbar-logo {
  font-size: 13px;
  font-weight: 700;
  color: var(--braise);
  letter-spacing: .02em;
}
.topbar-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.1); }
.topbar-title {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  font-weight: 400;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.tb-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.tb-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
.tb-btn.active { background: var(--braise); border-color: var(--braise); color: white; }

/* ══ MAIN LAYOUT ══ */
.workspace {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ══ SIDEBAR (nav écrans) ══ */
.sidebar {
  width: 220px;
  background: #201810;
  border-right: 1px solid rgba(255,255,255,0.05);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px 0;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

.sidebar-section {
  margin-bottom: 20px;
}
.sidebar-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  padding: 0 16px 8px;
}
.screen-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 7px 16px;
  border: none;
  background: transparent;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  transition: all .15s;
  text-align: left;
  border-left: 2px solid transparent;
}
.screen-btn:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.75); }
.screen-btn.active {
  background: rgba(194,89,24,0.12);
  color: rgba(255,255,255,0.9);
  font-weight: 500;
  border-left-color: var(--braise);
}
.screen-btn .dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.dot-done { background: var(--euca); }
.dot-todo { background: var(--braise); }
.dot-future { background: rgba(255,255,255,0.2); }

/* ══ CANVAS AREA ══ */
.canvas {
  flex: 1;
  overflow: auto;
  background: #2C2416;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 24px;
}
.canvas::-webkit-scrollbar { width: 6px; height: 6px; }
.canvas::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* ══ PHONE FRAME ══ */
.phone-frame {
  width: 390px;
  min-height: 844px;
  background: var(--white);
  border-radius: 48px;
  border: 10px solid #1A140E;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.phone-notch {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 28px;
  background: #1A140E;
  border-radius: 0 0 18px 18px;
  z-index: 10;
}
.phone-screen {
  width: 100%;
  min-height: 100%;
  background: var(--white);
  padding-top: 38px;
  overflow-y: auto;
}

/* ══ SCREEN ANNOTATION PANEL ══ */
.annot-panel {
  width: 280px;
  flex-shrink: 0;
  margin-left: 28px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-top: 8px;
}
.annot-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 14px 16px;
}
.annot-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--braise);
  margin-bottom: 8px;
}
.annot-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  line-height: 1.45;
}
.annot-row .a-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  flex-shrink: 0; margin-top: 5px;
}
.annot-row.done .a-dot { background: var(--euca); }
.annot-row.todo .a-dot { background: var(--braise); }
.annot-link {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: color .15s;
  margin-top: 4px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.annot-link:hover { color: var(--braise); }

/* ══════════════════════════════════════
   SCREEN COMPONENTS (mobile UI)
══════════════════════════════════════ */

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px 0;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
}
.status-icons { display: flex; gap: 5px; align-items: center; }
.status-icons svg { width: 14px; height: 14px; }

/* Mobile nav bar */
.mob-header {
  padding: 14px 20px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border2);
}
.mob-logo { font-size: 17px; font-weight: 700; color: var(--ink); }
.mob-logo em { color: var(--braise); font-style: normal; }
.mob-back {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--braise);
  font-weight: 500;
  cursor: pointer;
}

/* Hero block */
.hero {
  padding: 32px 20px 24px;
  text-align: center;
}
.hero-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--euca);
  background: var(--euca-bg);
  border: 1px solid var(--euca-bd);
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
}
.hero h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 10px;
  letter-spacing: -.02em;
}
.hero h1 em { color: var(--braise); font-style: normal; }
.hero p {
  font-size: 14px;
  color: var(--sub);
  line-height: 1.55;
  max-width: 280px;
  margin: 0 auto;
}

/* Big CTA buttons */
.cta-grid {
  padding: 0 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.cta-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-radius: var(--r);
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: all .18s;
  text-align: left;
}
.cta-btn:active { transform: scale(.98); }
.cta-btn.primary {
  background: var(--ink);
  color: white;
}
.cta-btn.secondary {
  background: var(--white);
  border-color: var(--border);
  color: var(--ink);
}
.cta-btn.outline {
  background: transparent;
  border-color: var(--border);
  color: var(--ink);
}
.cta-label { font-size: 15px; font-weight: 600; }
.cta-sub { font-size: 11px; opacity: .6; margin-top: 2px; }
.cta-arrow { font-size: 18px; opacity: .4; }

/* Section */
.mob-section { padding: 16px 20px 0; }
.mob-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* Link list */
.link-list { display: flex; flex-direction: column; gap: 8px; padding: 0 20px 20px; }
.link-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--white);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all .15s;
}
.link-item:active { background: var(--cream); }
.li-left { display: flex; align-items: center; gap: 12px; }
.li-ico {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.li-ico.braise { background: var(--braise-bg); }
.li-ico.euca { background: var(--euca-bg); }
.li-ico.gold { background: var(--gold-bg); }
.li-ico.ink { background: rgba(44,36,22,.06); }
.li-title { font-size: 14px; font-weight: 600; color: var(--ink); }
.li-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.li-arrow { color: var(--muted); font-size: 14px; }
.li-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--euca-bg);
  color: var(--euca);
  border: 1px solid var(--euca-bd);
}
.li-badge.new {
  background: var(--braise-bg);
  color: var(--braise);
  border-color: var(--braise-bd);
}

/* Search bar */
.search-bar {
  margin: 12px 20px;
  background: var(--cream);
  border: 1.5px solid var(--border2);
  border-radius: 12px;
  padding: 11px 14px 11px 38px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  color: var(--muted);
  font-style: italic;
  position: relative;
}
.search-wrap { position: relative; margin: 12px 20px; }
.search-wrap input {
  width: 100%;
  background: var(--cream);
  border: 1.5px solid var(--border2);
  border-radius: 12px;
  padding: 11px 14px 11px 38px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  color: var(--ink);
}
.search-ico {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 14px;
}

/* Filter chips */
.filter-chips {
  display: flex;
  gap: 6px;
  padding: 0 20px 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-chips::-webkit-scrollbar { display: none; }
.fchip {
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 20px;
  background: var(--white);
  border: 1.5px solid var(--border2);
  color: var(--sub);
  white-space: nowrap;
}
.fchip.active {
  background: var(--braise);
  border-color: var(--braise);
  color: white;
}

/* Song card */
.song-list { padding: 0 20px; display: flex; flex-direction: column; gap: 1px; }
.song-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border2);
}
.song-lang {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
  margin-right: 10px;
}
.sl-en { background: var(--braise-bg); color: var(--braise); }
.sl-fr { background: rgba(90,32,144,.1); color: #5A2090; }
.song-info { flex: 1; min-width: 0; }
.song-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-artist { font-size: 11px; color: var(--muted); }
.song-tags { display: flex; gap: 4px; margin-top: 3px; }
.stag { font-size: 9px; padding: 1px 6px; border-radius: 8px; background: var(--cream); color: var(--muted); }
.song-chevron { color: var(--muted); font-size: 12px; flex-shrink: 0; }

/* Form elements */
.form-group { margin: 0 20px 16px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--sub); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%;
  background: var(--cream);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  color: var(--ink);
}
.form-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.form-chip {
  font-size: 12px; font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--white);
  border: 1.5px solid var(--border2);
  color: var(--sub);
}
.form-chip.sel {
  background: var(--braise);
  border-color: var(--braise);
  color: white;
}

/* Submit button */
.submit-btn {
  margin: 0 20px 32px;
  width: calc(100% - 40px);
  padding: 15px;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: var(--r);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  transition: background .15s;
}
.submit-btn:hover { background: var(--braise); }

/* Planning */
.plan-month { padding: 14px 20px 6px; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.plan-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border2);
}
.plan-date {
  width: 44px; height: 44px;
  background: var(--cream);
  border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
.plan-day { font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1; }
.plan-month-abbr { font-size: 9px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.plan-info { flex: 1; }
.plan-type { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
.plan-badge {
  font-size: 9px; font-weight: 700;
  padding: 2px 7px; border-radius: 8px;
  text-transform: uppercase; letter-spacing: .06em;
}
.pb-chorale { background: var(--braise-bg); color: var(--braise); }
.pb-choraoke { background: var(--euca-bg); color: var(--euca); }
.plan-title { font-size: 13px; font-weight: 600; color: var(--ink); }
.plan-loc { font-size: 11px; color: var(--muted); }
.plan-next {
  margin: 12px 20px;
  background: var(--ink);
  color: white;
  border-radius: var(--r);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pn-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
.pn-title { font-size: 15px; font-weight: 700; }
.pn-sub { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 1px; }
.pn-arrow { font-size: 22px; color: var(--braise); }

/* Divider */
.divider { height: 1px; background: var(--border2); margin: 8px 20px; }
.spacer { height: 16px; }

/* Info block */
.info-block {
  margin: 0 20px 16px;
  background: var(--cream);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--sub);
  line-height: 1.5;
}
.info-block strong { color: var(--ink); }

/* Stat row */
.stat-row {
  display: flex;
  gap: 8px;
  padding: 0 20px 20px;
}
.stat-card {
  flex: 1;
  background: var(--cream);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.stat-num { font-size: 22px; font-weight: 700; color: var(--ink); }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* Who we are */
.wwa-block { padding: 20px 20px 0; }
.wwa-block p { font-size: 13px; color: var(--sub); line-height: 1.65; margin-bottom: 12px; }
.wwa-quote {
  border-left: 3px solid var(--braise);
  padding: 10px 14px;
  margin: 16px 0;
  font-size: 13px;
  font-style: italic;
  color: var(--ink2);
  line-height: 1.6;
}

/* Charte section */
.charte-section { margin: 0 20px 16px; }
.charte-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
.charte-item {
  display: flex;
  gap: 10px;
  margin-bottom: 8px;
  font-size: 12.5px;
  color: var(--sub);
  line-height: 1.5;
  align-items: flex-start;
}
.charte-bullet {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--euca);
  flex-shrink: 0;
  margin-top: 5px;
}
.charte-bullet.b { background: var(--braise); }

/* Modal bottom sheet */
.modal-sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px 32px;
  box-shadow: 0 -8px 40px rgba(44,36,22,0.12);
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--cream3);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 16px; }
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(44,36,22,0.3);
}

/* Floating button */
.fab {
  position: absolute;
  bottom: 24px; right: 20px;
  width: 52px; height: 52px;
  background: var(--braise);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 16px rgba(194,89,24,0.35);
  cursor: pointer;
  color: white;
}

/* Setlist button */
.setlist-btn {
  margin: 10px 20px 4px;
  background: var(--braise);
  color: white;
  border-radius: var(--r);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.sl-left { display:flex; align-items:center; gap:10px; }
.sl-tag { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.6); display:block; margin-bottom:2px; }
.sl-title { font-size:14px; font-weight:700; }
.sl-count { font-size:20px; color:rgba(255,255,255,.6); }

/* Song action buttons — new layout */
.song-actions { padding: 10px 0 4px; display:flex; flex-direction:column; gap:6px; }
.sa-main { display:flex; align-items:center; justify-content:center; gap:8px; padding:13px; background:var(--euca); color:white; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }
.sa-secondary { display:grid; grid-template-columns:1fr 1fr; gap:6px; }

        <input class="form-input" type="text" placeholder="Email ou téléphone" readonly>
      </div>
      <button class="submit-btn">Envoyer notre proposition →</button>
    `
  }
};

/* ════════════════════════════════
   RENDER ENGINE
════════════════════════════════ */
const statusLabels = { done: '✓ Déjà fait', todo: '→ À construire' };
const statusColors = { done: '#4E7A65', todo: '#C25918' };

function showScreen(id) {
  const screen = SCREENS[id];
  if (!screen) return;

  // Update sidebar
  document.querySelectorAll('.screen-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[onclick="showScreen('${id}')"]`);
  if (btn) btn.classList.add('active');

  // Render phone
  document.getElementById('phone-screen').innerHTML = screen.html;

  // Render annotations
  const panel = document.getElementById('annot-panel');
  const statusColor = statusColors[screen.status];
  panel.innerHTML = `
    <div class="annot-card">
      <div class="annot-title" style="color:${statusColor}">${screen.title}</div>
      <div style="font-size:12px; color:rgba(255,255,255,.35); margin-bottom:10px;">${screen.desc}</div>
      <div style="font-size:11px; font-weight:600; padding:4px 10px; border-radius:12px; display:inline-block; background:${statusColor}22; color:${statusColor}; border:1px solid ${statusColor}44; margin-bottom:10px; letter-spacing:.06em; text-transform:uppercase;">
        ${statusLabels[screen.status]}
      </div>
      ${screen.annots.map(a => `
        <div class="annot-row ${a.type}">
          <span class="a-dot"></span>
          <span>${a.text}</span>
        </div>`).join('')}
    </div>
    ${screen.links ? `
    <div class="annot-card">
      <div class="annot-title">Navigation depuis cet écran</div>
      ${screen.links.map(l => `
        <div class="annot-link" onclick="showScreen('${l.screen}')">
          → ${l.label}
        </div>`).join('')}
    </div>` : ''}
    <div class="annot-card">
      <div class="annot-title">Légende</div>
      <div class="annot-row done"><span class="a-dot"></span> Déjà construit et live</div>
      <div class="annot-row todo"><span class="a-dot"></span> À construire lors de la reprise</div>
    </div>
  `;
}

function setView(v) {
  document.getElementById('canvas-phone').style.display = v === 'phone' ? 'flex' : 'none';
  document.getElementById('canvas-flow').style.display = v === 'flow' ? 'flex' : 'none';
  document.getElementById('btn-phone').classList.toggle('active', v === 'phone');
  document.getElementById('btn-flow').classList.toggle('active', v === 'flow');
}

// Init
showScreen('accueil');
</script>
</body>
</html>
